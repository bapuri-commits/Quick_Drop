services:
  quickdrop:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: quickdrop
    ports:
      - "8200:8200"
    volumes:
      - ${DATA_DIR:-../data}/drop:/data/drop
      - ${DATA_DIR:-../data}/vault:/data/vault
      - ${DATA_DIR:-../data}/clipboard:/data/clipboard
    environment:
      QUICKDROP_UPLOAD_DIR: /data/drop
      QUICKDROP_VAULT_DIR: /data/vault
      QUICKDROP_CLIPBOARD_DIR: /data/clipboard
    env_file:
      - .env
    restart: unless-stopped
