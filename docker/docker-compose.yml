services:
  quickdrop:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: quickdrop
    ports:
      - "8200:8200"
    volumes:
      - ${DATA_DIR:-../data}/drop:/data/drop
      - ${DATA_DIR:-../data}/vault:/data/vault
      - ${DATA_DIR:-../data}/clipboard:/data/clipboard
      - /opt/envs/gdrive-token.json:/secrets/gdrive-token.json
    environment:
      QUICKDROP_UPLOAD_DIR: /data/drop
      QUICKDROP_VAULT_DIR: /data/vault
      QUICKDROP_CLIPBOARD_DIR: /data/clipboard
      GDRIVE_TOKEN_PATH: /secrets/gdrive-token.json
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
